services:
  postgres:
    image: postgres:17.3
    container_name: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: vet-db
    volumes:
      - ./volumes/postgresql:/var/lib/postgresql/data
  adminer:
    image: adminer:standalone
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
